                <div className="w-full max-w-md mx-auto shadow-xl bg-white min-h-screen relative my-0 md:my-8">
                    {showPopup && <CampaignPopup onClose={() => setShowPopup(false)} />}
                    <StickyHeader />
                    <Headline />
                    <EmpathySection />
                    <ProblemSection />
                    <CauseSection />
                    <SolutionSection />
                    <CoreApproachSection />
                    <BenefitSection />
                    <FeatureSection />
                    <CustomerVoiceSection />
                    <ReviewsSection />
                    <QASection />
                    <FinalCTA />
                    <Footer />
                    <StickyCTA />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        requestAnimationFrame(() => { window.scrollTo(0, 0); });
    </script>
</body>

</html>
